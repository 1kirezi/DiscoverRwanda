services:
  - type: web
    name: discover-rwanda
    runtime: docker
    rootDir: .
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "false"
      - key: AUTO_MIGRATE
        value: "true"
      - key: AUTO_SEED
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
